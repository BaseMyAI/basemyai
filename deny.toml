[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste is a transitive dependency of Candle/tokenizers with no safe upgrade available in this dependency line." },
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
# The current libSQL/Candle/RMCP graph intentionally carries duplicate
# transitive crates. Keep supply-chain CI focused on actionable failures.
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
