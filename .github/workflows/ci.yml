name: CI

run-name: "CI run '${{ github.head_ref || github.ref_name }}'"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  # ── Format ──────────────────────────────────────────────────────────────────

  format:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Gate qualité : clippy + tests, features légères ─────────────────────────
  # Ni CMake (crypto) ni Candle (embed) : couvre tout le workspace rapidement.
  # `--features` interdit à la racine d'un workspace virtuel → on cible chaque
  # crate avec `-p`. Les features `crypto`/`embed` ont leurs jobs dédiés.

  gate:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS retiré (multiplicateur ×10 sur les minutes Actions, plan gratuit).
        # On garde Windows : il a déjà révélé un bug spécifique (teardown MCP).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Clippy (-D warnings)
        run: |
          set -euxo pipefail
          cargo clippy -p basemyai-core --all-targets -- -D warnings
          cargo clippy -p basemyai --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-mcp --no-default-features --features stdio,http,test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-rest --no-default-features --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-py --no-default-features --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-node --no-default-features --features test-util --all-targets -- -D warnings

      - name: Test
        run: |
          set -euxo pipefail
          cargo test -p basemyai-core
          cargo test -p basemyai --features test-util
          cargo test -p basemyai-mcp --no-default-features --features stdio,http,test-util
          cargo test -p basemyai-rest --no-default-features --features test-util

  # ── Feature `embed` : Candle ML (compile + tests réels #[ignore]) ────────────

  embed:
    name: embed (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Job le plus lourd (compile Candle). La compilation ML est portable :
        # on la vérifie sur Linux uniquement pour économiser les minutes Actions.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: embed
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build + test (embed)
        run: |
          set -euxo pipefail
          cargo test -p basemyai-core --features embed
          cargo test -p basemyai --features embed

  # ── Feature `crypto` : chiffrement libSQL — exige CMake ─────────────────────
  # Bug libsql-ffi 0.9.30 : son build.rs appelle `cp`, absent du PATH Windows.
  # Le `usr/bin` de Git (présent sur les runners GitHub) le fournit.

  crypto:
    name: crypto (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS retiré (×10). Windows conservé : le quirk libsql-ffi `cp`/CMake
        # documenté ci-dessous est spécifique à Windows.
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install CMake (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: pip install cmake

      - name: Add Git usr/bin to PATH (Windows)
        if: runner.os == 'Windows'
        run: echo "C:/Program Files/Git/usr/bin" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: crypto
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Test (crypto)
        run: |
          set -euxo pipefail
          cargo test -p basemyai-core --features crypto
          cargo test -p basemyai --features crypto

  # ── Required checks gate ─────────────────────────────────────────────────────
  # Single job used as the branch-protection rule target.
  # Add / remove jobs above and mirror the change here.

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: success() || failure()
    needs:
      - format
      - gate
      - embed
      - crypto
    steps:
      - name: Check for failures
        run: |
          results=(
            "${{ needs.format.result }}"
            "${{ needs.gate.result }}"
            "${{ needs.embed.result }}"
            "${{ needs.crypto.result }}"
          )

          failed=false
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ A required job had result: $result"
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          else
            echo "✅ All required CI checks passed!"
          fi
