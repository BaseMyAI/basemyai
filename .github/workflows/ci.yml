name: CI

run-name: "CI run '${{ github.head_ref || github.ref_name }}'"

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'releases/*'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:

  # ── Format ──────────────────────────────────────────────────────────────────

  format:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  # ── Gate qualité : clippy + tests, features légères ─────────────────────────
  # Ni Candle (embed) ni tests lourds `#[ignore]` : couvre vite le workspace.
  # `--features` interdit à la racine d'un workspace virtuel → on cible chaque
  # crate avec `-p`. Le job `embed` reste dédié.

  gate:
    name: clippy + test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macOS retiré (multiplicateur ×10 sur les minutes Actions, plan gratuit).
        # On garde Windows : il a déjà révélé un bug spécifique (teardown MCP).
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Doc drift (ADR-033)
        run: cargo run --quiet --manifest-path xtask/Cargo.toml -- doc-drift

      - name: Clippy (-D warnings)
        run: |
          set -euxo pipefail
          cargo clippy -p basemyai-core --all-targets --features test-util -- -D warnings
          cargo clippy -p basemyai-engine --all-targets --features test-util -- -D warnings
          cargo clippy -p basemyai --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-mcp --no-default-features --features stdio,http,test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-rest --no-default-features --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-cli --all-targets -- -D warnings
          cargo clippy -p basemyai-py --no-default-features --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-node --no-default-features --features test-util --all-targets -- -D warnings
          cargo clippy -p basemyai-eval --all-targets -- -D warnings

      - name: Test
        run: |
          set -euxo pipefail
          cargo test -p basemyai-core --features test-util
          # --lib --bins --test basic --test vector_recall --test vector_persistence --test vector_churn --test graph_parity --test format_lock :
          # tests du moteur natif + harnais recall + persistance KV + churn
          # insert/delete (tombstones + consolidation FreshDiskANN, recall APRÈS
          # churn — ADR-026 §6) de l'index vectoriel (N3) + parité du graphe natif
          # (N4, scénarios de crates/basemyai/tests/graph.rs portés contre RAM et
          # persistant), SANS crash_consistency (kill-loop lent, job dédié ci-dessous).
          # + N7 : engine_stats (EngineStats), failpoints (injection d'erreurs aux
          # frontières de durabilité), corruption_smoke (bit-flip SST/WAL/crypto.meta
          # → erreurs typées, gap manifest ouvert pinné, cf. N11.3).
          # + N11.2/N11.3 : model_based (BTreeMap de référence vs Engine réel sur
          # séquences aléatoires déterministes), io_faults (accès refusé + tmp
          # orphelin déjà présent).
          # + N12/ADR-042 : adr042_contract — présent dans xtask (le miroir de
          # référence de ce fichier) depuis a3842e7 mais absent d'ici jusqu'à
          # cette ligne ; câblage manuel oublié (même défaut que celui déjà
          # documenté §8.3/status.md), corrigé au passage.
          # + J0 preflight (ENG-DUR-002/004,
          # docs/audits/2026-07-engine-architecture-safety-audit.md) :
          # generation_pointer_loss_is_rejected_and_gen1_survives,
          # compaction_remove_retry.
          # + N13/J3 (ADR-043 §2 amendé) : snapshot_compaction — snapshots
          # S1 + suppression différée des SST remplacées.
          cargo test -p basemyai-engine --features test-util --lib --bins --test basic --test vector_recall --test vector_persistence --test vector_churn --test graph_parity --test malformed_open --test engine_stats --test failpoints --test corruption_smoke --test adr042_contract --test generation_pointer_loss_is_rejected_and_gen1_survives --test compaction_remove_retry --test model_based --test io_faults --test format_lock --test snapshot_compaction
          cargo test -p basemyai --features test-util
          # --test memory_tests : runner déclaratif du contrat MemoryStore sur
          # le backend natif (clair + chiffré), zéro divergence tolérée.
          cargo test -p basemyai --features test-util --test memory_tests
          cargo test -p basemyai --features test-util --test p1_isolation_adversarial
          cargo test -p basemyai --features test-util --test poisoning_procedural_recall --test provenance_trust --test plaintext_open_forbidden --test temporal_replacement_ci --test temporal_dedup_consolidation --test export_isolation_adversarial --test isolation_recall_graph_adversarial
          cargo test -p basemyai-mcp --no-default-features --features stdio,http,test-util
          cargo test -p basemyai-rest --no-default-features --features test-util
          cargo test -p basemyai-cli
          # Recall Quality Lab (R2.x) : tests unitaires du runner/schéma/
          # comparaison + tests/cli.rs (assert_cmd sur le binaire basemyai-eval).
          cargo test -p basemyai-eval

  # ── Zero network : mémoire locale sans socket (proxy invalide) ───────────────

  zero-network-after-setup:
    name: zero-network-after-setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: zero-network
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Récupère toutes les dépendances (registre + build) AVANT de bloquer le
      # réseau sortant : le cache `rust-cache` n'est réchauffé que sur `main`
      # (save-if ci-dessus), donc une PR peut restaurer un cache obsolète —
      # sans ce fetch, `cargo test` tenterait de compléter le registre une
      # fois le proxy bloqué et échouerait sur une erreur réseau sans rapport
      # avec le test "zéro réseau" lui-même. Pas de `--locked` : `Cargo.lock`
      # n'est pas versionné dans ce repo (lib workspace), donc rien à locker
      # sur un checkout neuf — `cargo fetch` le génère ici, réseau encore ouvert.
      - name: Fetch dependencies (network still open)
        run: cargo fetch

      - name: Memory ops with outbound proxy blocked
        env:
          HTTP_PROXY: http://127.0.0.1:9
          HTTPS_PROXY: http://127.0.0.1:9
        run: |
          set -euxo pipefail
          cargo test -p basemyai --features test-util --test zero_network_recall --offline
          cargo test -p basemyai --features test-util provision_without_consent_fails_when_model_absent --offline

  # ── Feature `embed` : Candle ML (compile + tests réels #[ignore]) ────────────

  embed:
    name: embed (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Job le plus lourd (compile Candle). La compilation ML est portable :
        # on la vérifie sur Linux uniquement pour économiser les minutes Actions.
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: embed
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Build + test (embed)
        run: |
          set -euxo pipefail
          cargo test -p basemyai-core --features embed,test-util
          cargo test -p basemyai --features embed,test-util

  # ── `basemyai-engine` crash-consistency harness (N2, TODO-NATIVE-ENGINE.md) ─
  # Kill/reopen/verify loop: spawns `crash_writer`, force-kills it mid-write
  # (`taskkill /F` on Windows, `kill -9` on Linux), reopens the Engine, checks
  # every durably-confirmed key survives. Windows is the primary target (the
  # WAL-truncate-after-flush bug this harness guards against was Windows-only),
  # Linux kept for portability of the kill primitive itself.

  crash-consistency:
    name: crash-consistency (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: crash-consistency
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Kill/reopen/verify loop (basemyai-engine)
        run: |
          set -euxo pipefail
          cargo test -p basemyai-engine --features test-util --test crash_consistency -- --nocapture

  # ── Recall Quality Lab : artefact non-bloquant (R2.x) ────────────────────────
  # Exécute le dataset canonique et upload le rapport en artefact. Volontairement
  # absent de `needs` ci-dessous : les assertions qualité (budget, provenance,
  # déterminisme, must_include/must_exclude) ne deviennent un gate bloquant
  # qu'une fois une baseline revue committée (docs/recall-quality-lab.md
  # §"Required integrations", item 4) — décision produit séparée, pas prise ici.
  # `basemyai-eval` lui-même (compile + tests unitaires/CLI) reste bloquant via
  # le job `gate` ci-dessus ; seule l'exécution du dataset est avancée ici.

  recall-quality-lab:
    name: recall-quality-lab (artifact, non-blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: recall-quality-lab
          save-if: ${{ github.ref == 'refs/heads/main' }}

      - name: Run recall-core dataset
        continue-on-error: true
        run: |
          cargo run -p basemyai-eval -- run \
            eval/datasets/recall-core.jsonl \
            --output eval/reports/recall-core.ci.json \
            --human eval/reports/recall-core.ci.md

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: recall-quality-lab-report
          path: |
            eval/reports/recall-core.ci.json
            eval/reports/recall-core.ci.md
          if-no-files-found: warn

  # ── Required checks gate ─────────────────────────────────────────────────────
  # Single job used as the branch-protection rule target.
  # Add / remove jobs above and mirror the change here.

  required-checks:
    name: Required checks
    runs-on: ubuntu-latest
    if: success() || failure()
    needs:
      - format
      - gate
      - zero-network-after-setup
      - embed
      - crash-consistency
    steps:
      - name: Check for failures
        run: |
          results=(
            "${{ needs.format.result }}"
            "${{ needs.gate.result }}"
            "${{ needs.zero-network-after-setup.result }}"
            "${{ needs.embed.result }}"
            "${{ needs.crash-consistency.result }}"
          )

          failed=false
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "❌ A required job had result: $result"
              failed=true
            fi
          done

          if [[ "$failed" == "true" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          else
            echo "✅ All required CI checks passed!"
          fi
