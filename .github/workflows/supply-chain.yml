name: Supply chain security

run-name: "Supply chain '${{ github.head_ref || github.ref_name }}'"

on:
  workflow_dispatch:
  push:
    paths:
      - Cargo.lock
      - Cargo.toml
      - deny.toml
      - 'bindings/*/package.json'
      - 'bindings/*/package-lock.json'
      - 'bindings/*/Cargo.toml'
      - 'crates/*/Cargo.toml'
      - .github/workflows/node-prebuilds.yml
      - .github/workflows/supply-chain.yml
    branches:
      - main
  pull_request:
    paths:
      - Cargo.lock
      - Cargo.toml
      - deny.toml
      - 'bindings/*/package.json'
      - 'bindings/*/package-lock.json'
      - 'bindings/*/Cargo.toml'
      - 'crates/*/Cargo.toml'
      - .github/workflows/node-prebuilds.yml
      - .github/workflows/supply-chain.yml
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref == 'refs/heads/main' && github.run_id || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  cargo-deny:
    name: Check dependencies (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Setup environment
        uses: ./.github/actions/setup-environment
        with:
          enable-sccache: 'false'

      - name: Install cargo-deny
        run: cargo install --debug --locked cargo-deny@0.19.4

      - name: Check dependencies
        run: cargo deny check

      - name: Summarize failure
        if: failure()
        run: |
          echo "## ⚠️ Supply chain check failed" >> $GITHUB_STEP_SUMMARY
          echo "A dependency has a known vulnerability, is banned, or has an incompatible license." >> $GITHUB_STEP_SUMMARY
          echo "Run \`cargo deny check\` locally to see details, then update \`deny.toml\` accordingly." >> $GITHUB_STEP_SUMMARY

  npm-audit:
    name: Check Node dependencies (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/basemyai-node
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: bindings/basemyai-node/package-lock.json

      - name: Install Node dependencies
        run: npm ci

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
