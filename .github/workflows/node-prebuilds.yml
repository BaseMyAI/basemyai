name: Node prebuilds

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Construit les binaires natifs NAPI (.node, features crypto + embed) par
# plateforme. napi9 est stable au niveau ABI : un prebuild par OS/arch tourne
# dès Node 18.17 (testé ci-dessous sur 20/22 — le CLI de build exige 20+).
# crypto exige CMake.
defaults:
  run:
    working-directory: bindings/basemyai-node

jobs:
  validate-secrets:
    name: validate publish credentials
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Require NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN is required for tagged npm releases." >&2
            exit 1
          fi

  build:
    name: prebuild (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      # rust-toolchain.toml pins channel 1.95, so the build uses 1.95 — not the
      # `stable` the action set the target on. Add the target to the pinned
      # toolchain that actually compiles (fixes cross x86_64 on arm64 runners).
      - name: Add Rust target to pinned toolchain
        run: rustup target add ${{ matrix.target }}

      - name: Install CMake (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Install CMake (macOS)
        if: runner.os == 'macOS'
        run: brew install cmake

      - name: Install CMake (Windows)
        if: runner.os == 'Windows'
        run: pip install cmake

      # libsql-ffi 0.9.30 appelle `cp`, absent du PATH Windows — Git le fournit.
      - name: Add Git usr/bin to PATH (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: echo "C:/Program Files/Git/usr/bin" >> "$GITHUB_PATH"

      - run: npm install --include=dev

      - name: Build native addon
        run: npx napi build --platform --release --target ${{ matrix.target }} --features crypto,embed

      - uses: actions/upload-artifact@v7
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/basemyai-node/*.node

  smoke-prebuild:
    name: smoke prebuild (${{ matrix.target }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: bindings/basemyai-node
      - name: Import native addon without rebuilding
        run: npm run smoke:import

  test:
    name: test (node ${{ matrix.node }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Le binaire prebuilt (ABI napi9) tourne dès Node 18.17 ; mais ce job
        # REBUILD via @napi-rs/cli 3, dont une dépendance (@inquirer/core) importe
        # `styleText` de `node:util` — API Node 20.12+. Le CLI ne s'exécute donc
        # pas sous Node 18. On teste le rebuild sur 20/22 (l'ABI est identique).
        node: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: npm install --include=dev
      # Build debug sans crypto/embed (rapide) pour valider l'ABI sur chaque Node.
      - run: npx napi build --platform --no-default-features --features test-util
      - run: npx jest

  # Publication npm — uniquement sur tag, et seulement si le secret est présent.
  # Nécessite `NPM_TOKEN` dans les secrets du dépôt (rien n'est publié sans).
  publish-npm:
    name: publish to npm
    needs: [validate-secrets, build, smoke-prebuild, test]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm install --include=dev
      - name: Collect prebuilt addons
        uses: actions/download-artifact@v4
        with:
          path: bindings/basemyai-node/artifacts
      - name: Assemble publish package
        shell: bash
        run: |
          set -euo pipefail
          find artifacts -name '*.node' -print -exec cp '{}' . \;
          test -f basemyai.linux-x64-gnu.node
          npm run smoke:import
          npm pack --dry-run --json > pack.json
          node -e "const fs = require('node:fs'); const files = JSON.parse(fs.readFileSync('pack.json', 'utf8'))[0].files.map(f => f.path); const banned = files.filter(p => /^(src\/|__tests__\/|target\/|artifacts\/|Cargo\.|build\.rs$|package-lock\.json$)/.test(p)); if (banned.length) { throw new Error('npm pack includes forbidden files: ' + banned.join(', ')); }"
      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
      - name: Verify npm publication
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          for i in $(seq 1 20); do
            published="$(npm view "basemyai@$version" version --registry https://registry.npmjs.org 2>/dev/null || true)"
            if [ "$published" = "$version" ]; then
              echo "Verified basemyai@$version on npm."
              exit 0
            fi
            echo "Waiting for npm registry propagation ($i/20)..."
            sleep 15
          done
          echo "npm publication verification failed for basemyai@$version." >&2
          exit 1
