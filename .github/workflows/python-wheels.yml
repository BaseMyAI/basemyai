name: Python wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Construit les wheels PyO3 (feature embed) pour Linux/macOS/Windows × CPython
# 3.10–3.13.
jobs:
  validate-secrets:
    name: validate publish credentials
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Require PYPI_API_TOKEN
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$MATURIN_PYPI_TOKEN" ]; then
            echo "PYPI_API_TOKEN is required for tagged PyPI releases." >&2
            exit 1
          fi

  wheels:
    name: wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: |
            3.10
            3.11
            3.12
            3.13

      - name: Build wheels
        uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8 # v1
        with:
          command: build
          args: --release --out dist --find-interpreter
          working-directory: bindings/basemyai-py
          # Force the manylinux container on Linux so the wheel carries a
          # PyPI-acceptable manylinux tag (a bare host build tags linux_x86_64,
          # which PyPI rejects). The container runs the script below as root.
          manylinux: auto

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: wheels-${{ matrix.os }}
          path: bindings/basemyai-py/dist/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Build sdist
        uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8 # v1
        with:
          command: sdist
          args: --out dist
          working-directory: bindings/basemyai-py
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: sdist
          path: bindings/basemyai-py/dist/*.tar.gz

  smoke-wheels:
    name: smoke wheel import (${{ matrix.os }})
    needs: wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: wheels-${{ matrix.os }}
          path: dist
      - name: Install wheel and import package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links dist basemyai
          python -c "import basemyai; assert hasattr(basemyai, 'Memory')"

  # Publication PyPI — uniquement sur tag, et seulement si le secret est présent.
  # Nécessite `PYPI_API_TOKEN` dans les secrets du dépôt (rien n'est publié sans).
  publish-pypi:
    name: publish to PyPI
    needs: [validate-secrets, wheels, sdist, smoke-wheels]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist
          merge-multiple: true
      - name: Publish
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        uses: PyO3/maturin-action@423a6347767a8b16e65c2a7a7042e4a921528da8 # v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*
      - name: Verify PyPI publication
        run: |
          python - <<'PY' > version.txt
          import tomllib
          with open("bindings/basemyai-py/pyproject.toml", "rb") as f:
              print(tomllib.load(f)["project"]["version"])
          PY
          for i in $(seq 1 20); do
            if python -m pip install --no-cache-dir --index-url https://pypi.org/simple "basemyai==$(cat version.txt)"; then
              python -c "import basemyai; assert hasattr(basemyai, 'Memory')"
              exit 0
            fi
            echo "Waiting for PyPI propagation ($i/20)..."
            sleep 15
          done
          echo "PyPI publication verification failed for basemyai==$(cat version.txt)." >&2
          exit 1
