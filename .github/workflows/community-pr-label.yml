# Community PR Labeler
#
# Automatically labels PRs from community contributors (non-core team members).
# Uses pull_request_target so it can label PRs from forks.
# SAFE: we never check out PR code — only read PR metadata from the GitHub context.

name: Community PR Labeler

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize]

permissions: read-all

jobs:
  label-community-pr:
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Label community PRs
        uses: actions/github-script@v9
        with:
          script: |
            // Update this list when core team membership changes.
            const CORE_TEAM = [
              // TODO: add GitHub usernames of core team members here
            ]

            const author = context.payload.pull_request.user.login.toLowerCase()
            console.log('PR Author:', author)

            if (!CORE_TEAM.includes(author)) {
              await github.rest.issues.addLabels({
                ...context.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['community'],
              })
              console.log(`Added "community" label for ${author}`)
            } else {
              console.log(`Skipping — ${author} is a core team member`)
            }
