name: Release (crates.io + GitHub)

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # création de la GitHub Release

# Publie les crates Rust et crée la Release GitHub. Les wheels PyPI et le package
# npm sont publiés par leurs workflows dédiés (python-wheels.yml / node-prebuilds.yml),
# également déclenchés par le tag. Rien n'est publié sans les secrets requis.
jobs:
  validate-secrets:
    name: validate publish credentials
    runs-on: ubuntu-latest
    steps:
      - name: Require CARGO_REGISTRY_TOKEN
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CARGO_REGISTRY_TOKEN is required for tagged crates.io releases." >&2
            exit 1
          fi

  crates-io:
    name: publish crates.io
    needs: validate-secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish (basemyai-core puis basemyai)
        # basemyai dépend de basemyai-core : il faut publier le socle d'abord,
        # puis laisser l'index se propager avant de publier la couche mémoire.
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euxo pipefail
          test -n "$CARGO_REGISTRY_TOKEN"
          cargo publish -p basemyai-core
          for i in $(seq 1 10); do
            if cargo publish -p basemyai; then break; fi
            echo "retry $i: en attente de la propagation de l'index crates.io…"
            sleep 30
          done

  github-release:
    name: GitHub Release
    needs: crates-io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
