name: Fuzz (nightly)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: cargo-fuzz (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Une entrée par cible réelle de crates/basemyai-engine/fuzz/fuzz_targets/
        # (N11.1, §8.4) — aucune exception, pas de sous-échantillon "représentatif".
        target:
          - key_roundtrip
          - wal_decode
          - wal_envelope_decode
          - vector_node_decode
          - vector_node_decode_structured
          - vector_meta_decode
          - graph_entity_decode
          - graph_edge_decode
          - sst_header_decode
          - sst_data_block_decode
          - sst_data_block_decode_structured
          - sst_block_index_decode
          - sst_block_index_decode_structured
          - sst_bloom_filter_decode
          - sst_footer_decode
          - store_meta_decode
          - sst_manifest_decode
          - generation_meta_decode
          - crypto_meta_decode
          - crypto_meta_decode_structured
          - encrypted_sst_block_decode
          - fts_docterms_decode
          - fts_postings_decode
          - fts_stats_decode
          - memory_index_meta_decode
          - memory_record_decode
          - memory_vecmap_decode
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: dtolnay/rust-toolchain@4fd1da8b0805d2d2e936788875a7d65dbd677dc2 # nightly

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run fuzz target (bounded)
        working-directory: crates/basemyai-engine/fuzz
        run: cargo fuzz run ${{ matrix.target }} -- -max_total_time=120 -rss_limit_mb=2048
