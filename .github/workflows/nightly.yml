name: Nightly (crash loops prolongés + bench 100k)

# PLAN-NATIVE-ENGINE.md §8.3, palier "Nightly" : crash loops prolongés (au-delà
# du smoke test 20 cycles du gate de PR) + workloads 100k clair/chiffré. Le
# fuzzing par codec est déjà couvert par `fuzz.yml` (même palier, cron séparé).
# "delete/reinsert churn" et "tests avec failpoints" sont déjà exercés à
# chaque PR (`vector_churn`/`failpoints` dans le gate) — aucune raison de les
# refaire ici à l'identique tant qu'ils ne réclament pas plus de cycles.

on:
  schedule:
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      crash_cycles:
        description: "Cycles kill/reopen/verify par mode (défaut 200, vs 20 au gate)"
        default: "200"
      bench_n:
        description: "Taille du workload engine_bench (clair+chiffré)"
        default: "100000"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  crash-consistency-long:
    name: crash-consistency long (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      BASEMYAI_CRASH_CYCLES: ${{ github.event.inputs.crash_cycles || '200' }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: nightly-crash-consistency

      - name: Kill/reopen/verify loop (long, basemyai-engine)
        run: |
          set -euxo pipefail
          cargo test -p basemyai-engine --features test-util --test crash_consistency -- --nocapture

  bench-100k:
    name: engine_bench 100k (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: nightly-bench-100k

      - name: engine_bench (clair+chiffré, via cargo xtask engine-bench)
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          cargo run --manifest-path xtask/Cargo.toml -- engine-bench \
            --n "${{ github.event.inputs.bench_n || '100000' }}" \
            --out artifacts/engine-bench-nightly.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: engine-bench-nightly-${{ matrix.os }}-${{ github.run_id }}
          path: artifacts/*.json
          retention-days: 30
