name: Soak campaign (long, weekly)

# PLAN-NATIVE-ENGINE.md §8.3, palier "Campagne longue régulière" : soak
# continu, compaction répétée, clair/chiffré, Windows/Linux/macOS. macOS n'est
# pas dans le gate de PR ni le nightly (coût ×10 sur le plan Actions gratuit,
# décision déjà documentée dans ci.yml) — acceptable ici, cadence
# hebdomadaire. `cargo xtask engine-soak` boucle `engine_bench` (clair+chiffré
# à chaque cycle), donc chaque cycle exerce déjà flush/compaction répétées.
#
# Volontairement PAS couvert par ce chantier (pas de fausse promesse) :
# rotation de clé pendant le soak, disque presque plein, comptage de handles
# — aucun de ces trois n'a d'instrumentation moteur/xtask existante à câbler ;
# ce sont des chantiers de code séparés, pas de la config CI. Voir le suivi
# dans PLAN-NATIVE-ENGINE.md §8.3/N11.

on:
  schedule:
    - cron: "0 4 * * 0" # dimanche 04:00 UTC
  workflow_dispatch:
    inputs:
      cycles:
        description: "Cycles engine-soak (chaque cycle = 1 engine_bench clair + 1 chiffré)"
        default: "3"
      n:
        description: "Taille du workload par cycle (1000000 pour une vraie campagne 1M à la demande)"
        default: "200000"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  soak:
    name: engine-soak (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: soak-campaign

      - name: engine-soak
        run: |
          set -euxo pipefail
          cargo run --manifest-path xtask/Cargo.toml -- engine-soak \
            "${{ github.event.inputs.cycles || '3' }}" \
            "${{ github.event.inputs.n || '200000' }}"
