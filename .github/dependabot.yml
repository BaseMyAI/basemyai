version: 2
updates:
  # Rust workspace
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: "chore(deps)"
    groups:
      cargo-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci(deps)"

  # Python binding (maturin / PyO3)
  - package-ecosystem: pip
    directory: "/bindings/basemyai-py"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps-py)"

  # Node binding (NAPI-RS)
  - package-ecosystem: npm
    directory: "/bindings/basemyai-node"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps-node)"
