name: 'Test workspace'
description: 'Run the full workspace test suite with cargo nextest'

inputs:
  save-cache:
    description: 'Whether to save the cargo cache'
    required: false
    default: 'false'
  # Run tests with a specific feature set. Default features only.
  # Pass "embed" to enable Candle embedding tests (heavy build).
  features:
    description: 'Cargo features to enable (space-separated). Empty = default features.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      uses: ./.github/actions/setup-environment
      with:
        save-cache: ${{ inputs.save-cache }}

    - name: Install tools
      uses: ./.github/actions/install-tools
      with:
        preset: test

    - name: Test workspace (default features)
      if: inputs.features == ''
      shell: bash
      run: cargo nextest run --workspace

    - name: Test workspace (with features)
      if: inputs.features != ''
      shell: bash
      run: cargo nextest run --workspace --features "${{ inputs.features }}"
