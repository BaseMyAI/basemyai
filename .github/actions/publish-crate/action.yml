name: 'Publish crate'
description: 'Publish workspace crates to crates.io (with dry-run support)'

inputs:
  publish:
    description: 'Whether to actually publish (false = dry-run only)'
    required: false
    default: 'false'
  cargo-registry-token:
    description: 'Token for publishing to crates.io'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Setup environment
      uses: ./.github/actions/setup-environment

    - name: Install release-plz
      uses: taiki-e/install-action@80e6af7a2ec7f280fffe2d0a9d3a12a9d11d86e9 # v2.75.1
      with:
        tool: release-plz@0.3.30

    - name: Configure release-plz
      shell: bash
      run: |
        cat << 'EOF' > /tmp/release-plz.toml
        [workspace]
        changelog_update = false
        git_release_enable = false
        semver_check = false
        git_tag_enable = false
        EOF

    - name: Publish dry-run
      if: inputs.publish == 'false'
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo-registry-token }}
      run: |
        set -x
        git checkout -b publish-dryrun
        echo "Running cargo publish --workspace --dry-run"
        cargo publish --workspace --dry-run

    - name: Publish to crates.io
      if: inputs.publish == 'true'
      shell: bash
      env:
        CARGO_REGISTRY_TOKEN: ${{ inputs.cargo-registry-token }}
      run: |
        set -x
        git checkout -b publish-release

        # Use release-plz for retry logic and idempotency
        if ! release-plz release --config /tmp/release-plz.toml; then
          # Check if everything is already published (idempotent success)
          all_published=true
          for crate in $(cargo metadata --format-version 1 --no-deps \
              | jq -r '.packages[] | select(.publish != []) | .name'); do
            version=$(cargo metadata --format-version 1 --no-deps \
              | jq -r ".packages[] | select(.name == \"$crate\") | .version")
            if ! cargo search "$crate" --limit 1 | grep -q "^$crate = \"$version\""; then
              echo "$crate@$version is NOT published"
              all_published=false
              break
            fi
          done

          if [[ "$all_published" == "true" ]]; then
            echo "All crates already published — idempotent success."
          else
            echo "Some crates failed to publish."
            exit 1
          fi
        fi
