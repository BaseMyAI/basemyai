name: Feature request
description: Request a new feature or capability.
type: "Feature"
labels: ["triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature for BaseMyAI!
  - id: kind
    type: dropdown
    attributes:
      label: What component does this affect?
      options:
        - basemyai-core (storage / vectors / embeddings)
        - basemyai (memory layers / temporal RAG / cognition)
        - Python SDK (PyO3)
        - Node SDK (NAPI-RS)
        - REST sidecar
        - basemyai CLI (setup / provision)
        - New component / surface
    validations:
      required: true
  - id: problem
    type: textarea
    attributes:
      label: Is this feature related to a problem?
      description: What is the use case in which this feature is relevant?
      placeholder: A clear and concise description of what the problem is. E.g. "I'm always frustrated when..."
    validations:
      required: true
  - id: solution
    type: textarea
    attributes:
      label: Describe the solution you'd like
      description: Suggest a solution and how it might work.
      placeholder: A clear and concise description of what you want to happen.
    validations:
      required: true
  - id: alternatives
    type: textarea
    attributes:
      label: Alternatives considered
      description: Describe alternatives you've considered.
      placeholder: A clear and concise description of any alternative solutions or features you've considered.
    validations:
      required: true
  - id: contact
    type: input
    attributes:
      label: Contact details
      description: How can we get in touch with you if we need more info?
      placeholder: discord:username or email@example.com
    validations:
      required: false
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search [our issues](https://github.com/basemyai/basemyai/issues) to see if this was already requested.
      options:
        - label: I have searched the existing issues
          required: true
  - type: checkboxes
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/basemyai/basemyai/blob/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
